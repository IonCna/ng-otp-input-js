<style>
    .ng-otp-input {
        display: flex !important;
        gap: 0.5rem !important;
        align-items: center !important;
        flex-wrap: wrap !important;
    }

    .ng-otp-input input {
        width: 2.75rem !important;
        height: 2.9rem !important;
        appearance: none !important;
        padding: 0.35rem !important;
        background-clip: padding-box !important;
        -moz-appearance: none !important;
        background: #ffffff !important;
        color: #212529 !important;
        caret-color: #2563eb !important;
        border: 1px solid #cbd5e1 !important;
        border-radius: 0.85rem !important;
        font-size: 1rem !important;
        font-weight: 500 !important;
        line-height: 1 !important;
        text-align: center !important;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .ng-otp-input input:focus {
        outline: 0 !important;
        border-color: #93c5fd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
        transform: translateY(-1px);
    }

    .ng-otp-input input:hover {
        width: 2.75rem !important;
        height: 2.9rem !important;
    }
</style>

<div class="ng-otp-input">
    <input ng-disabled="$.otpDisabled" ng-focus="$.onFocus($event)" ng-keyup="$.onKeyUp($event, chunk)"
        ng-keydown="$.onKeyDown($event, chunk)" ng-blur="$.onBlur()" maxlength="1" ng-attr-name="otp-{{ chunk + 1 }}"
        ng-repeat="chunk in $.chunks track by chunk" ng-attr-id="ng-otp-chunk-{{ chunk }}"
        ng-attr-aria-label="ng-otp-chunk-{{ chunk + 1 }}" type="text">
</div>
