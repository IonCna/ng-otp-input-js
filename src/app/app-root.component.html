<main class="app-root">
  <section class="hero-shell">
    <div class="hero-grid">
      <div class="hero-panel">
        <p class="hero-panel__eyebrow">AngularJS OTP Demo</p>
        <h1 class="hero-panel__title">{{ $ctrl.title }}</h1>
        <p class="hero-panel__description">{{ $ctrl.description }}</p>

        <div class="hero-panel__actions">
          <button type="button" class="app-button app-button--solid" ng-click="$ctrl.toggleNumbersMode()">
            Solo numeros: {{ $ctrl.otpOnlyNumbers ? 'ON' : 'OFF' }}
          </button>
          <button
            type="button"
            class="app-button app-button--ghost"
            ng-click="$ctrl.toggleKeyboardMode()"
          >
            Arrows: {{ $ctrl.otpKeyboard ? 'ON' : 'OFF' }}
          </button>
          <button
            type="button"
            class="app-button app-button--ghost"
            ng-click="$ctrl.toggleDisabledMode()"
          >
            Disabled: {{ $ctrl.otpDisabled ? 'ON' : 'OFF' }}
          </button>
        </div>

        <div class="hero-panel__length">
          <span class="hero-panel__length-label">Digitos</span>
          <div class="stepper" role="group" aria-label="Longitud OTP">
            <button type="button" class="stepper__button" ng-click="$ctrl.decreaseLength()">-</button>
            <span class="stepper__value">{{ $ctrl.otpMaxLength }}</span>
            <button type="button" class="stepper__button" ng-click="$ctrl.increaseLength()">+</button>
          </div>
        </div>
      </div>

      <div class="demo-device">
        <div class="demo-device__screen">
          <p class="demo-device__badge">Live Preview</p>
          <h2 class="demo-device__title">One-time password</h2>
          <p class="demo-device__text">Prueba la navegacion y los bindings reales del componente.</p>

          <div class="demo-device__otp">
            <ng-otp-input
              otp-max-length="$ctrl.otpMaxLength"
              otp-disabled="$ctrl.otpDisabled"
              otp-only-numbers="$ctrl.otpOnlyNumbers"
              otp-keyboard="$ctrl.otpKeyboard"
              otp-on-complete="$ctrl.handleOtpComplete($event)"
            ></ng-otp-input>
          </div>

          <div class="demo-device__result">
            <span class="demo-device__result-label">Ultimo valor</span>
            <strong class="demo-device__result-value">{{ $ctrl.completedValue }}</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="highlights-grid">
      <div class="highlights-grid__item" ng-repeat="item in $ctrl.highlights track by item.title">
        <demo-highlight
          eyebrow="{{ item.eyebrow }}"
          title="{{ item.title }}"
          text="{{ item.text }}"
        ></demo-highlight>
      </div>
    </div>
  </section>
</main>
